<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終端安全管理系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2575fc;
            --secondary: #6a11cb;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --dark: #1a1a2e;
            --darker: #0f0f1a;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
            --text-dim: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: var(--text-dim);
            margin-bottom: 25px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        .login-box input:focus {
            border-color: var(--primary);
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .login-box button:hover {
            opacity: 0.9;
        }

        .login-error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        /* Main Dashboard */
        .dashboard {
            display: none;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: var(--primary);
        }

        .connection-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .connection-badge.connected {
            background: rgba(46, 204, 113, 0.15);
            color: var(--success);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .connection-badge.disconnected {
            background: rgba(231, 76, 60, 0.15);
            color: var(--danger);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .stat-label {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .stat-card .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .panels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .panel h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .panel h3 i {
            font-size: 1.1rem;
        }

        .log-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .log-item {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.2);
            font-size: 0.85rem;
            border-left: 3px solid var(--info);
        }

        .log-item.error {
            border-left-color: var(--danger);
            background: rgba(231, 76, 60, 0.1);
        }

        .log-item.warning {
            border-left-color: var(--warning);
            background: rgba(243, 156, 18, 0.1);
        }

        .log-item.success {
            border-left-color: var(--success);
            background: rgba(46, 204, 113, 0.1);
        }

        .log-time {
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        .device-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .device-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .device-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .device-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .device-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .device-status.idle {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .status-indicator.online {
            background: rgba(46, 204, 113, 0.15);
            color: var(--success);
        }

        .status-indicator.offline {
            background: rgba(231, 76, 60, 0.15);
            color: var(--danger);
        }

        .alert-box {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .alert-box.active {
            display: block;
            animation: pulse 2s infinite;
        }

        .alert-box.critical {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: var(--danger);
        }

        .alert-box.warning {
            background: rgba(243, 156, 18, 0.15);
            border: 1px solid rgba(243, 156, 18, 0.3);
            color: var(--warning);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-dim);
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .last-sync {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.1);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-danger {
            background: rgba(231, 76, 60, 0.2);
            border-color: rgba(231, 76, 60, 0.3);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(231, 76, 60, 0.3);
        }

        @media (max-width: 768px) {
            .panels-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-shield-alt" style="font-size: 48px; color: var(--primary); margin-bottom: 15px;"></i>
            <h1>終端安全管理系統</h1>
            <p>請輸入密碼以訪問安全監控面板</p>
            <input type="password" id="loginPassword" placeholder="輸入終端密碼" autofocus>
            <button onclick="TerminalApp.login()">
                <i class="fas fa-sign-in-alt"></i> 登錄
            </button>
            <div class="login-error" id="loginError">
                <i class="fas fa-exclamation-circle"></i> 密碼錯誤
            </div>
            <p style="margin-top: 15px; font-size: 0.8rem; color: var(--text-dim);">
                默認密碼:不告诉你
            </p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1><i class="fas fa-terminal"></i> 終端安全管理系統</h1>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <span class="connection-badge" id="connectionBadge">
                    <i class="fas fa-circle" style="font-size: 8px;"></i>
                    <span id="connectionText">未連接</span>
                </span>
                <button class="btn" onclick="TerminalApp.refresh()">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
                <button class="btn btn-danger" onclick="TerminalApp.logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>
        </div>

        <!-- Alert Box -->
        <div class="alert-box critical" id="alertBox">
            <h4 style="margin-bottom: 8px;"><i class="fas fa-exclamation-triangle"></i> <span id="alertTitle">安全警報</span></h4>
            <p id="alertMessage"></p>
            <p style="font-size: 0.8rem; margin-top: 5px;">
                <i class="fas fa-globe"></i> IP: <span id="alertIp">-</span> | 
                <i class="fas fa-clock"></i> <span id="alertTime">-</span>
            </p>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users" style="color: var(--primary);"></i></div>
                <div class="stat-value" id="statUserCount" style="color: var(--primary);">0</div>
                <div class="stat-label">總用戶數</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-laptop" style="color: var(--info);"></i></div>
                <div class="stat-value" id="statDeviceCount" style="color: var(--info);">0</div>
                <div class="stat-label">連接設備</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-heartbeat" style="color: var(--success);"></i></div>
                <div class="stat-value" id="statSystemStatus" style="color: var(--success);">正常</div>
                <div class="stat-label">系統狀態</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-database" style="color: var(--warning);"></i></div>
                <div class="stat-value" id="statBackupStatus" style="color: var(--warning);">未備份</div>
                <div class="stat-label">數據備份</div>
            </div>
        </div>

        <!-- Panels Grid -->
        <div class="panels-grid">
            <!-- Connected Devices Panel -->
            <div class="panel">
                <h3><i class="fas fa-laptop"></i> 連接設備</h3>
                <div class="device-list" id="deviceList">
                    <div class="empty-state">
                        <i class="fas fa-desktop"></i>
                        <p>暫無連接設備</p>
                    </div>
                </div>
                <div class="last-sync" id="deviceLastSync"></div>
            </div>

            <!-- System Logs Panel -->
            <div class="panel">
                <h3><i class="fas fa-clipboard-list"></i> 系統日誌</h3>
                <div class="log-list" id="logList">
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>暫無日誌記錄</p>
                    </div>
                </div>
                <div class="last-sync" id="logLastSync"></div>
            </div>

            <!-- System Info Panel -->
            <div class="panel">
                <h3><i class="fas fa-info-circle"></i> 系統信息</h3>
                <div id="systemInfo">
                    <div class="empty-state">
                        <i class="fas fa-server"></i>
                        <p>等待主系統連接...</p>
                    </div>
                </div>
                <div class="last-sync" id="infoLastSync"></div>
            </div>

            <!-- Quick Actions Panel -->
            <div class="panel">
                <h3><i class="fas fa-bolt"></i> 快捷操作</h3>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn" onclick="TerminalApp.requestBackup()">
                        <i class="fas fa-cloud-upload-alt"></i> 請求數據備份
                    </button>
                    <button class="btn" onclick="TerminalApp.triggerTestAlert()">
                        <i class="fas fa-bell"></i> 發送測試警報
                    </button>
                    <button class="btn btn-danger" onclick="TerminalApp.lockSystem()">
                        <i class="fas fa-lock"></i> 鎖定系統
                    </button>
                    <button class="btn" onclick="TerminalApp.unlockSystem()">
                        <i class="fas fa-unlock"></i> 解鎖系統
                    </button>
                    <button class="btn" onclick="window.open('index.html', '_blank')">
                        <i class="fas fa-external-link-alt"></i> 打開主系統
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const TerminalApp = {
        password: null,
        isLoggedIn: false,
        pollingInterval: null,

        // ========== Login ==========
        login() {
            const input = document.getElementById('loginPassword');
            const error = document.getElementById('loginError');
            const entered = input ? input.value : '';

            // Get expected password from localStorage (set by main system) or use default
            const savedPassword = localStorage.getItem('terminalConnectPassword') || 
                                 localStorage.getItem('terminalPassword') || 
                                 'admin12312';

            if (entered === savedPassword) {
                this.password = entered;
                this.isLoggedIn = true;
                error.style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                // Mark terminal as active
                localStorage.setItem('terminalActive', 'true');
                localStorage.setItem('terminalActiveTime', new Date().toISOString());

                this.startMonitoring();
                this.refresh();
                console.log('[Terminal] Logged in successfully');
            } else {
                error.style.display = 'block';
                input.value = '';
                input.focus();
            }
        },

        logout() {
            this.isLoggedIn = false;
            this.password = null;
            
            // Stop monitoring
            if (this.pollingInterval) {
                clearInterval(this.pollingInterval);
                this.pollingInterval = null;
            }

            // Mark terminal as inactive
            localStorage.removeItem('terminalActive');
            localStorage.removeItem('terminalActiveTime');

            // Show login screen
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        },

        // ========== Data Reading ==========
        getSystemData() {
            try {
                const raw = localStorage.getItem('terminalSystemData');
                if (raw) return JSON.parse(raw);
            } catch (e) {
                console.error('[Terminal] Error parsing system data:', e);
            }
            return null;
        },

        getMainSystemData() {
            // Read directly from main system's localStorage keys
            const data = {};
            const keys = ['users', 'history', 'prizes', 'loginHistory', 'operationLogs', 'feedback', 'config'];
            keys.forEach(key => {
                try {
                    const raw = localStorage.getItem(key);
                    if (raw) data[key] = JSON.parse(raw);
                } catch (e) {}
            });
            return data;
        },

        // ========== Monitoring ==========
        startMonitoring() {
            const self = this;
            
            // Immediate refresh
            self.refresh();

            // Poll every 3 seconds
            if (self.pollingInterval) clearInterval(self.pollingInterval);
            self.pollingInterval = setInterval(() => {
                self.refresh();
            }, 3000);

            // Listen for storage changes (main system writes to localStorage)
            window.addEventListener('storage', function(e) {
                if (e.key === 'terminalSystemData' || 
                    e.key === 'terminalSyncTimestamp' ||
                    e.key === 'terminalConnectionActive') {
                    self.refresh();
                }
                // Handle system lock/unlock from main system
                if (e.key === 'systemLocked') {
                    if (e.newValue === 'true') {
                        self.showAlert('系統已鎖定', '主系統已觸發鎖定', '127.0.0.1', 'critical');
                    } else {
                        self.hideAlert();
                    }
                }
            });

            // Listen for postMessage from main system
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'TERMINAL_CONNECT') {
                    console.log('[Terminal] Received connection from main system');
                    self.refresh();
                }
                if (e.data && e.data.type === 'TERMINAL_SYNC') {
                    self.refresh();
                }
            });

            console.log('[Terminal] Monitoring started');
        },

        // ========== Refresh Display ==========
        refresh() {
            if (!this.isLoggedIn) return;

            const sysData = this.getSystemData();
            const mainData = this.getMainSystemData();

            // Check connection status
            const isConnected = localStorage.getItem('terminalConnectionActive') === 'true';
            this.updateConnectionStatus(isConnected);

            // Update stats
            this.updateStats(sysData, mainData);

            // Update devices
            this.updateDevices(sysData);

            // Update logs
            this.updateLogs(sysData, mainData);

            // Update system info
            this.updateSystemInfo(sysData, mainData);

            // Check for alerts
            this.checkAlerts();

            // Update timestamps
            const now = new Date().toLocaleString('zh-CN');
            document.getElementById('deviceLastSync').textContent = '最後更新: ' + now;
            document.getElementById('logLastSync').textContent = '最後更新: ' + now;
            document.getElementById('infoLastSync').textContent = '最後更新: ' + now;
        },

        updateConnectionStatus(isConnected) {
            const badge = document.getElementById('connectionBadge');
            const text = document.getElementById('connectionText');
            
            if (isConnected) {
                badge.className = 'connection-badge connected';
                text.textContent = '已連接到主系統';
            } else {
                badge.className = 'connection-badge disconnected';
                text.textContent = '未連接';
            }
        },

        updateStats(sysData, mainData) {
            const users = mainData.users || [];
            const devices = sysData ? sysData.devices : [];

            document.getElementById('statUserCount').textContent = users.length;
            document.getElementById('statDeviceCount').textContent = devices ? devices.length : 0;

            // Backup status
            const lastSave = localStorage.getItem('githubLastSave');
            const backupEl = document.getElementById('statBackupStatus');
            if (lastSave) {
                backupEl.textContent = '已備份';
                backupEl.style.color = 'var(--success)';
            } else {
                backupEl.textContent = '未備份';
                backupEl.style.color = 'var(--warning)';
            }
        },

        updateDevices(sysData) {
            const list = document.getElementById('deviceList');
            const devices = sysData && sysData.devices ? sysData.devices : [];

            if (!devices || devices.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-desktop"></i>
                        <p>暫無連接設備</p>
                    </div>`;
                return;
            }

            list.innerHTML = devices.map((dev, idx) => `
                <div class="device-item">
                    <div class="device-info">
                        <div class="device-icon"><i class="fas fa-laptop"></i></div>
                        <div>
                            <div style="font-weight: 600;">${dev.id || 'DEV' + String(idx+1).padStart(3,'0')}</div>
                            <div style="font-size: 0.75rem; color: var(--text-dim);">
                                IP: ${dev.ip || '127.0.0.1'} | ${dev.location || 'Unknown'}
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 0.75rem; color: var(--text-dim);">${dev.connected || ''}</span>
                        <div class="device-status ${dev.status === 'active' ? '' : 'idle'}"></div>
                    </div>
                </div>
            `).join('');
        },

        updateLogs(sysData, mainData) {
            const list = document.getElementById('logList');
            
            // Get logs from terminalSystemData or operationLogs
            let logs = [];
            if (sysData && sysData.logs) {
                logs = sysData.logs;
            } else if (mainData.operationLogs) {
                logs = mainData.operationLogs.slice(0, 20).map(log => ({
                    level: log.status === 'error' ? 'error' : 'info',
                    message: log.action,
                    ip: log.ip || '127.0.0.1',
                    time: log.time
                }));
            }

            if (!logs || logs.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>暫無日誌記錄</p>
                    </div>`;
                return;
            }

            list.innerHTML = logs.map(log => `
                <div class="log-item ${log.level || 'info'}">
                    <div class="log-time">${log.time || new Date().toLocaleString('zh-CN')}</div>
                    <div>${log.message || '-'}</div>
                    <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 4px;">
                        <i class="fas fa-globe"></i> ${log.ip || '127.0.0.1'}
                    </div>
                </div>
            `).join('');

            // Scroll to top
            list.scrollTop = 0;
        },

        updateSystemInfo(sysData, mainData) {
            const container = document.getElementById('systemInfo');
            
            const users = mainData.users || [];
            const prizes = mainData.prizes || [];
            const history = mainData.history || [];
            const lastSave = localStorage.getItem('githubLastSave');
            const masterUrl = localStorage.getItem('terminalMasterUrl') || '未知';

            const infoStyle = 'display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem;';
            const labelStyle = 'color: var(--text-dim);';

            container.innerHTML = `
                <div style="${infoStyle}">
                    <span style="${labelStyle}"><i class="fas fa-users"></i> 總用戶數</span>
                    <span>${users.length}</span>
                </div>
                <div style="${infoStyle}">
                    <span style="${labelStyle}"><i class="fas fa-gift"></i> 獎品數量</span>
                    <span>${prizes.length}</span>
                </div>
                <div style="${infoStyle}">
                    <span style="${labelStyle}"><i class="fas fa-history"></i> 歷史記錄</span>
                    <span>${history.length}</span>
                </div>
                <div style="${infoStyle}">
                    <span style="${labelStyle}"><i class="fas fa-database"></i> 數據備份</span>
                    <span class="status-indicator ${lastSave ? 'online' : 'offline'}">
                        <i class="fas fa-circle" style="font-size: 6px;"></i> ${lastSave ? '已備份' : '未備份'}
                    </span>
                </div>
                <div style="${infoStyle} border-bottom: none;">
                    <span style="${labelStyle}"><i class="fas fa-link"></i> 主系統</span>
                    <span style="font-size: 0.75rem; max-width: 150px; overflow: hidden; text-overflow: ellipsis;">${masterUrl}</span>
                </div>
            `;
        },

        // ========== Alerts ==========
        checkAlerts() {
            try {
                const alertData = localStorage.getItem('terminalAlertData');
                if (alertData) {
                    const alert = JSON.parse(alertData);
                    if (alert.level === 'critical') {
                        this.showAlert('安全警報', alert.message, alert.ip, 'critical');
                        return;
                    }
                }
            } catch (e) {}
            
            // Check if system is locked
            if (localStorage.getItem('systemLocked') === 'true') {
                this.showAlert('系統已鎖定', '主系統處於鎖定狀態', '-', 'critical');
                return;
            }

            this.hideAlert();
        },

        showAlert(title, message, ip, level) {
            const box = document.getElementById('alertBox');
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = message;
            document.getElementById('alertIp').textContent = ip || '-';
            document.getElementById('alertTime').textContent = new Date().toLocaleString('zh-CN');
            
            box.className = 'alert-box active ' + (level === 'critical' ? 'critical' : 'warning');
        },

        hideAlert() {
            const box = document.getElementById('alertBox');
            box.className = 'alert-box';
        },

        // ========== Quick Actions ==========
        requestBackup() {
            // Dispatch event that main system listens for
            window.dispatchEvent(new CustomEvent('terminalRequestBackup'));
            
            // Also notify via localStorage
            localStorage.setItem('terminalBackupRequested', Date.now().toString());
            
            alert('已發送備份請求到主系統');
        },

        triggerTestAlert() {
            const alertData = {
                level: 'critical',
                message: '這是一個測試警報',
                ip: '127.0.0.1',
                time: new Date().toISOString()
            };
            localStorage.setItem('terminalAlertData', JSON.stringify(alertData));
            this.refresh();
            
            // Auto clear after 10 seconds
            setTimeout(() => {
                localStorage.removeItem('terminalAlertData');
                this.refresh();
            }, 10000);
        },

        lockSystem() {
            if (confirm('確定要鎖定主系統嗎？所有用戶將無法操作。')) {
                localStorage.setItem('systemLocked', 'true');
                localStorage.setItem('systemLockedTime', new Date().toISOString());
                localStorage.setItem('systemLockedBy', 'terminal');
                this.refresh();
                alert('系統已鎖定');
            }
        },

        unlockSystem() {
            localStorage.removeItem('systemLocked');
            localStorage.removeItem('systemLockedTime');
            localStorage.removeItem('systemLockedBy');
            this.refresh();
            alert('系統已解鎖');
        }
    };

    // Handle Enter key on login
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') TerminalApp.login();
    });

    // Auto-login if already authenticated in this session
    window.addEventListener('DOMContentLoaded', function() {
        console.log('[Terminal] Terminal system loaded');
        
        // Check if there's an active connection from main system
        const isActive = localStorage.getItem('terminalConnectionActive') === 'true';
        if (isActive) {
            console.log('[Terminal] Detected active main system connection');
        }
    });
    </script>
</body>
</html>
